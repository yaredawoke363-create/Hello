name: luxury_ecommerce
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Animations
  flutter_animate: ^4.3.0
  animations: ^2.0.11

  # 3D & Effects
  flutter_3d_controller: ^1.3.1
  vector_math: ^2.1.4

  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  flutter_carousel_widget: ^2.2.0
  skeletonizer: ^1.0.1
  shimmer: ^3.0.0

  # Glassmorphism
  glass_kit: ^3.0.0
  blur: ^3.1.0

  # Icons
  phosphor_flutter: ^2.0.1

  # Images
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_analytics: ^10.8.0

  # Payment
  flutter_stripe: ^10.0.0
  pay: ^1.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  uuid: ^4.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.3
  connectivity_plus: ^5.0.2

  # Security
  crypto: ^3.0.3
  encrypt: ^5.0.1

  # Testing
  mocktail: ^1.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1

  # FlutterGen
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900

    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/PlayfairDisplay-Black.ttf
          weight: 900

    - family: PlayfairDisplay-Italic
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-MediumItalic.ttf
          style: italic
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-SemiBoldItalic.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-BoldItalic.ttf
          style: italic
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/config/
